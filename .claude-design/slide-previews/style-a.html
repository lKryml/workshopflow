<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style A: Terminal Dark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --green: #3fb950;
    --green-bright: #56d364;
    --blue: #79c0ff;
    --text: #e6edf3;
    --muted: #8b949e;
    --border: #30363d;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  .slide {
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start;
    padding: clamp(2rem, 5vw, 5rem);
    position: relative;
    overflow: hidden;
  }

  /* Grid background */
  .slide::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(48,54,61,0.4) 1px, transparent 1px),
      linear-gradient(90deg, rgba(48,54,61,0.4) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  /* Green glow orb */
  .slide::after {
    content: '';
    position: absolute;
    top: -20%; right: -10%;
    width: 60vw; height: 60vw;
    background: radial-gradient(ellipse, rgba(63,185,80,0.07) 0%, transparent 70%);
    z-index: 0;
  }

  .content { position: relative; z-index: 1; max-width: 820px; }

  .prompt-line {
    font-family: 'Fira Code', monospace;
    font-size: clamp(0.75rem, 1.2vw, 0.9rem);
    color: var(--green);
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 0.5rem;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 0.1s;
  }

  .prompt-line::before { content: '▸'; color: var(--green-bright); }

  .title {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(2rem, 4.5vw, 3.5rem);
    font-weight: 600;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 0.75rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.25s;
  }

  .title span { color: var(--green-bright); }

  .subtitle {
    font-size: clamp(1rem, 1.8vw, 1.3rem);
    font-weight: 300;
    color: var(--muted);
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.4s;
  }

  .tags {
    display: flex; gap: 0.75rem; flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.55s;
  }

  .tag {
    font-family: 'Fira Code', monospace;
    font-size: clamp(0.65rem, 1vw, 0.8rem);
    padding: 0.35rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--blue);
    background: rgba(121,192,255,0.06);
  }

  .tag.green { color: var(--green); background: rgba(63,185,80,0.06); border-color: rgba(63,185,80,0.3); }

  .bottom-bar {
    position: absolute; bottom: 2rem; left: 0; right: 0;
    padding: 0 clamp(2rem, 5vw, 5rem);
    display: flex; justify-content: space-between; align-items: center;
    z-index: 1;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.7s;
  }

  .bottom-bar .label {
    font-family: 'Fira Code', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .status {
    display: flex; align-items: center; gap: 0.4rem;
    font-family: 'Fira Code', monospace;
    font-size: 0.75rem;
    color: var(--green);
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }

  .style-name {
    position: absolute; top: 2rem; right: clamp(2rem, 5vw, 5rem);
    font-family: 'Fira Code', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    z-index: 1;
    opacity: 0;
    animation: fadeUp 0.4s ease forwards 0.05s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }
</style>
</head>
<body>
<div class="slide">
  <div class="style-name">Style A — Terminal Dark</div>
  <div class="content">
    <div class="prompt-line">git workshop --session=2 --level=hands-on</div>
    <h1 class="title">Git Hands-On Workshop:<br><span>From Zero to Merge Conflicts</span></h1>
    <p class="subtitle">Second Session – Let's Do It!</p>
    <div class="tags">
      <span class="tag green">$ practice every command</span>
      <span class="tag green">$ handle merge conflicts</span>
      <span class="tag">team workflows</span>
      <span class="tag">job market ready</span>
    </div>
  </div>
  <div class="bottom-bar">
    <span class="label">// instructor deck · session 2</span>
    <div class="status"><div class="dot"></div> hands-on session</div>
  </div>
</div>
</body>
</html>
